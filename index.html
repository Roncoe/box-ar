<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MB Design — Shelf AR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  body { margin:0; overflow:hidden; font-family:system-ui,sans-serif; }
  #banner { position:fixed; top:0; left:0; right:0; z-index:10; text-align:center;
            padding:8px; background:rgba(0,0,0,.55); color:#fff; font-size:14px; }
</style>
</head>
<body>
<div id="banner">Loading boxes…</div>

<!--
  RUNTIME-DRIVEN AR PAGE
  This file is generic. What each card shows comes from boxes.json, fetched on load.
  Change a card's box by editing boxes.json (dimensions/color) and reloading — no rebuild.
  Adding a NEW card value still needs a printed marker (run build_ar.py -> markers.pdf).

  Marker type: 4x4_BCH_13_9_3 (512 codes). Markers printed at 200 mm (see markers.pdf).
  Scale: 1 A-Frame unit = marker width (0.200 m); box units = inches * 0.0254 / 0.200.
-->
<a-scene embedded vr-mode-ui="enabled: false"
         renderer="logarithmicDepthBuffer: true; colorManagement: true;"
         arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3; debugUIEnabled: false;">
  <a-light type="ambient" intensity="0.9"></a-light>
  <a-light type="directional" intensity="0.4" position="1 3 2"></a-light>
  <a-entity camera></a-entity>
</a-scene>

<script>
  const MARKER_WIDTH_M = 0.200;                     // must match printed marker width
  const INCH_TO_UNIT   = 0.0254 / MARKER_WIDTH_M;   // inches -> A-Frame units
  const banner = document.getElementById('banner');
  const scene  = document.querySelector('a-scene');

  function addBox(b) {
    const w = b.width_in  * INCH_TO_UNIT;
    const d = b.depth_in  * INCH_TO_UNIT;
    const h = b.height_in * INCH_TO_UNIT;
    const m = document.createElement('a-marker');
    m.setAttribute('type', 'barcode');
    m.setAttribute('value', b.value);
    m.setAttribute('smooth', 'true');
    m.setAttribute('smoothCount', '8');
    m.setAttribute('smoothTolerance', '0.01');
    m.setAttribute('smoothThreshold', '4');
    const box = document.createElement('a-box');
    box.setAttribute('position', `0 ${(h/2).toFixed(4)} 0`);
    box.setAttribute('width',  w.toFixed(4));
    box.setAttribute('height', h.toFixed(4));
    box.setAttribute('depth',  d.toFixed(4));
    box.setAttribute('material', `color:${b.color}; roughness:0.85; metalness:0;`);
    m.appendChild(box);
    scene.appendChild(m);
  }

  // cache-bust so an edited boxes.json shows up on reload (GitHub/browers cache aggressively)
  fetch('boxes.json?ts=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(boxes => {
      boxes.forEach(addBox);
      banner.textContent = `Loaded ${boxes.length} boxes — point the camera at a marker`;
    })
    .catch(e => { banner.textContent = 'Could not load boxes.json: ' + e.message; });
</script>
</body>
</html>
