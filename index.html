<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MB Design — Shelf AR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  body { margin:0; overflow:hidden; font-family:system-ui,sans-serif; }
  #banner { position:fixed; top:0; left:0; right:0; z-index:10; text-align:center;
            padding:8px; background:rgba(0,0,0,.55); color:#fff; font-size:15px; }
</style>
</head>
<body>
<div id="banner">Loading boxes…</div>

<!--
  RUNTIME-DRIVEN AR PAGE (v2)
  Fetch boxes.json FIRST, then build the whole <a-scene> with its markers, then attach it.
  This guarantees the markers exist when AR.js initializes (v1 added them too late, so
  AR.js never watched for them -> camera worked but nothing rendered).
  Banner shows live detection: "Marker N detected" when a card is recognized.

  Marker type: 4x4_BCH_13_9_3. Markers printed at 200 mm (markers.pdf).
  Scale: 1 A-Frame unit = marker width (0.200 m); box units = inches * 0.0254 / 0.200.
-->
<script>
  const MARKER_WIDTH_M = 0.200;
  const INCH_TO_UNIT   = 0.0254 / MARKER_WIDTH_M;
  const banner = document.getElementById('banner');

  function buildScene(boxes) {
    const scene = document.createElement('a-scene');
    scene.setAttribute('embedded', '');
    scene.setAttribute('vr-mode-ui', 'enabled: false');
    scene.setAttribute('renderer', 'logarithmicDepthBuffer: true; colorManagement: true;');
    // Higher sourceWidth/Height = more pixels on the marker = detection from much farther.
    // 1280x960 is a good balance; push to 1920x1440 for more range (costs some FPS on older phones).
    scene.setAttribute('arjs', 'sourceType: webcam; sourceWidth: 1280; sourceHeight: 960; displayWidth: 1280; displayHeight: 960; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3; debugUIEnabled: false;');

    const amb = document.createElement('a-light');
    amb.setAttribute('type', 'ambient'); amb.setAttribute('intensity', '0.9');
    scene.appendChild(amb);
    const dir = document.createElement('a-light');
    dir.setAttribute('type', 'directional'); dir.setAttribute('intensity', '0.4');
    dir.setAttribute('position', '1 3 2');
    scene.appendChild(dir);

    boxes.forEach(b => {
      const w = b.width_in  * INCH_TO_UNIT;
      const d = b.depth_in  * INCH_TO_UNIT;
      const h = b.height_in * INCH_TO_UNIT;
      const m = document.createElement('a-marker');
      m.setAttribute('type', 'barcode');
      m.setAttribute('value', b.value);
      m.setAttribute('smooth', 'true');
      m.setAttribute('smoothCount', '8');
      m.setAttribute('smoothTolerance', '0.01');
      m.setAttribute('smoothThreshold', '4');
      m.addEventListener('markerFound', () => banner.textContent = `Marker ${b.value} detected — ${b.label}`);
      m.addEventListener('markerLost',  () => banner.textContent = 'Point the camera at a marker');
      const box = document.createElement('a-box');
      box.setAttribute('position', `0 ${(h/2).toFixed(4)} 0`);
      box.setAttribute('width',  w.toFixed(4));
      box.setAttribute('height', h.toFixed(4));
      box.setAttribute('depth',  d.toFixed(4));
      box.setAttribute('material', `color:${b.color}; roughness:0.85; metalness:0;`);
      m.appendChild(box);
      scene.appendChild(m);
    });

    const cam = document.createElement('a-entity');
    cam.setAttribute('camera', '');
    scene.appendChild(cam);

    document.body.appendChild(scene);   // attach LAST -> AR.js boots with markers present
  }

  fetch('boxes.json?ts=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(boxes => {
      buildScene(boxes);
      banner.textContent = `Loaded ${boxes.length} boxes — point the camera at a marker`;
    })
    .catch(e => { banner.textContent = 'Could not load boxes.json: ' + e.message; });
</script>
</body>
</html>
